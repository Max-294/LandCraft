<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Land Craft 魔王造型預覽</title>
  <desc id="desc">綠色魔王、藍色魔王、紅色魔王、彩色魔王四種造型。</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#7b2f1d"/>
      <stop offset="55%" stop-color="#1d1418"/>
      <stop offset="100%" stop-color="#0c090d"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#35232a"/>
      <stop offset="100%" stop-color="#171015"/>
    </linearGradient>
    <linearGradient id="rainbowBoss" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#54e28d"/>
      <stop offset="34%" stop-color="#58a6ff"/>
      <stop offset="68%" stop-color="#ff73c5"/>
      <stop offset="100%" stop-color="#ffd65b"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="greenGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#45d66d" flood-opacity="0.8"/>
    </filter>
    <filter id="blueGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#4aa3ff" flood-opacity="0.8"/>
    </filter>
    <filter id="redGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff4f45" flood-opacity="0.8"/>
    </filter>
    <filter id="rainbowGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffd65b" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="1200" height="560" fill="url(#bgGlow)"/>
  <text x="600" y="56" text-anchor="middle" fill="#fff5dc" font-size="34" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Land Craft 魔王造型預覽</text>
  <text x="600" y="92" text-anchor="middle" fill="#d8b98c" font-size="18" font-family="Arial, 'Noto Sans TC', sans-serif">戰鬥畫面會依玩家土地數量出現不同魔王</text>

  <g transform="translate(55 130)">
    <rect width="250" height="350" rx="14" fill="url(#card)" stroke="rgba(255,205,132,0.28)" filter="url(#softShadow)"/>
    <g transform="translate(125 142)" filter="url(#greenGlow)">
      <path d="M-54 -78 L-20 -24 L-70 -26 Z" fill="#ffe7a3"/>
      <path d="M54 -78 L20 -24 L70 -26 Z" fill="#ffe7a3"/>
      <ellipse cx="0" cy="-4" rx="72" ry="58" fill="#45d66d"/>
      <path d="M-50 -32 C-20 -64 36 -62 58 -22 C40 -50 -14 -50 -50 -32 Z" fill="#ffffff" opacity="0.22"/>
      <path d="M-48 50 C-20 18 26 18 54 50 C45 84 -39 84 -48 50 Z" fill="#3ac160"/>
      <path d="M-88 24 C-112 38 -104 74 -68 66 C-78 52 -72 34 -88 24 Z" fill="#45d66d"/>
      <path d="M88 24 C112 38 104 74 68 66 C78 52 72 34 88 24 Z" fill="#45d66d"/>
      <ellipse cx="-25" cy="-6" rx="10" ry="15" fill="#fff7df"/>
      <ellipse cx="25" cy="-6" rx="10" ry="15" fill="#fff7df"/>
      <ellipse cx="-21" cy="-4" rx="4" ry="7" fill="#101010"/>
      <ellipse cx="29" cy="-4" rx="4" ry="7" fill="#101010"/>
      <path d="M-15 28 Q0 39 15 28" fill="none" stroke="#2a1517" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="125" y="266" text-anchor="middle" fill="#fff5dc" font-size="24" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">綠色魔王</text>
    <text x="125" y="300" text-anchor="middle" fill="#d8b98c" font-size="16" font-family="Arial, 'Noto Sans TC', sans-serif">初期登場，地底小魔王</text>
  </g>

